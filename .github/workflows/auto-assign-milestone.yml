name: Auto-assign Milestone

on:
  issues:
    types: [opened]

jobs:
  assign-milestone:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Extract mod and assign milestone
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            
            // Split body into lines and trim whitespace
            const lines = body.split('\n').map(line => line.trim());
            
            // Find the index of the Modpack/Mod heading
            const headingIndex = lines.findIndex(line => line === '### Modpack/Mod');
            
            let mod = null;
            if (headingIndex !== -1 && headingIndex + 1 < lines.length) {
              // The next non-empty line should be the selected value
              const nextLine = lines[headingIndex + 1];
              if (nextLine && nextLine !== '') {
                mod = nextLine;
              }
            }
            
            if (!mod) {
              console.log('No mod found in issue body');
              return;
            }
            
            console.log(`Found mod: ${mod}`);
            
            // List existing milestones
            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all'
            });
            
            // Check if milestone exists
            let milestone = milestones.data.find(m => m.title === mod);
            
            // Create milestone if it doesn't exist
            if (!milestone) {
              console.log(`Creating milestone: ${mod}`);
              const newMilestone = await github.rest.issues.createMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: mod
              });
              milestone = newMilestone.data;
            } else {
              console.log(`Milestone already exists: ${mod}`);
            }
            
            // Assign issue to milestone
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              milestone: milestone.number
            });
            console.log(`Issue assigned to milestone: ${mod}`);
